<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DecisionPhone | Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script type="module" src="/js/main.js"></script>
</head>
<body data-page="admin">
  <div data-app-nav></div>
  <main class="container py-4 py-lg-5">
    <div data-admin-panel>
      <div class="page-card p-3 p-lg-4 mb-4">
        <h1 class="section-title">Admin Dashboard</h1>
        <p class="text-muted mb-0">Manage devices, sync seed data, and review registered users.</p>
      </div>
      <div class="admin-panel p-3 p-lg-4 mb-4">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
          <h2 class="h5 fw-bold mb-0">Add or Edit Device</h2>
          <button class="btn btn-outline-primary" data-sync-json>Sync JSON</button>
        </div>
        <form data-admin-phone-form class="row g-3">
          <input type="hidden" name="phone_id">
          <div class="col-md-4"><label class="form-label">Brand</label><input class="form-control" name="brand"></div>
          <div class="col-md-4"><label class="form-label">Name</label><input class="form-control" name="name"></div>
          <div class="col-md-4"><label class="form-label">Image URL</label><input class="form-control" name="image_url"></div>
          <div class="col-md-3"><label class="form-label">Price</label><input class="form-control" type="number" step="0.01" name="price"></div>
          <div class="col-md-3"><label class="form-label">RAM</label><input class="form-control" type="number" name="ram"></div>
          <div class="col-md-3"><label class="form-label">Storage</label><input class="form-control" type="number" name="storage"></div>
          <div class="col-md-3"><label class="form-label">Camera</label><input class="form-control" type="number" name="camera"></div>
          <div class="col-md-3"><label class="form-label">Battery</label><input class="form-control" type="number" name="battery"></div>
          <div class="col-md-5"><label class="form-label">Processor</label><input class="form-control" name="processor"></div>
          <div class="col-md-4"><label class="form-label">Performance Score</label><input class="form-control" type="number" step="0.1" name="performance_score"></div>
          <div class="col-md-3 d-grid align-self-end"><button class="btn btn-primary" type="submit">Save Device</button></div>
        </form>
      </div>
      <div class="page-card p-3 p-lg-4 mb-4">
        <h2 class="h5 fw-bold mb-3">Phones</h2>
        <div class="table-responsive spec-table">
          <table class="table table-striped align-middle mb-0">
            <thead class="table-light"><tr><th>ID</th><th>Brand</th><th>Name</th><th>Price</th><th>RAM</th><th>Storage</th><th>Actions</th></tr></thead>
            <tbody data-admin-phone-table></tbody>
          </table>
        </div>
      </div>
      <div class="page-card p-3 p-lg-4">
        <h2 class="h5 fw-bold mb-3">Users</h2>
        <div class="table-responsive spec-table">
          <table class="table table-striped align-middle mb-0">
            <thead class="table-light"><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th></tr></thead>
            <tbody data-admin-user-table></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
  <div data-app-footer></div>
  <div data-toast-stack></div>
  <div data-loading-overlay></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/js/admin.js"></script>
</body>
</html>
